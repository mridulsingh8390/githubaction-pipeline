name: PostgreSQL Source-to-Target Migration

# Copies data directly from an existing source database to an existing
# target database — for cloning/refreshing an environment WITHOUT
# provisioning a new database. Internally: backup source to S3 + safety-
# backup target + restore source's dump onto target.
#
# THIS OVERWRITES THE TARGET DATABASE. Same safety pattern as
# postgres-restore-s3.yml: typed confirmation, mandatory pre-overwrite
# backup, checksum verification, single-transaction restore, approval gate.
#
# REQUIRED SECRETS:
#   AWS_BACKUP_ROLE_ARN  — used only for the source dump (write-only)
#   AWS_RESTORE_ROLE_ARN — used for target safety-backup + restore (read+write)
#   <ENV>_DB_HOST, <ENV>_DB_PORT, <ENV>_DB_NAME, <ENV>_DB_USER, <ENV>_DB_PASSWORD
#
# REQUIRED GITHUB ENVIRONMENTS: db-migrate-s2t-approval-<TARGET> per
# environment you want gated.

on:
  workflow_dispatch:
    inputs:
      s3Bucket:
        description: "S3 bucket to use as the transfer intermediary (also serves as an audit trail)"
        required: true
        type: string
      kmsKeyId:
        description: "KMS key ARN for encryption (blank = SSE-S3/AES256)"
        required: false
        default: ""
        type: string
      sourceEnvironment:
        description: "Database to copy FROM"
        required: true
        type: choice
        options: [DEV, STAGING, PROD]
      targetEnvironment:
        description: "Database to copy INTO — THIS WILL BE OVERWRITTEN"
        required: true
        type: choice
        options: [DEV, STAGING, PROD]
      confirmTargetName:
        description: "Type the targetEnvironment value exactly (e.g. STAGING) to confirm you want to overwrite it"
        required: true
        type: string
      postMigrationCheckQuery:
        description: "Optional custom SQL to run after migration (e.g. 'SELECT count(*) FROM orders;'). Logged for manual review, not auto-evaluated."
        required: false
        default: ""
        type: string
      awsRegion:
        description: "AWS region"
        required: false
        default: "us-east-1"
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: db-s2t-migrate-${{ inputs.targetEnvironment }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check confirmation and reject same-environment no-op
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ inputs.confirmTargetName }}" != "${{ inputs.targetEnvironment }}" ]; then
            echo "::error::confirmTargetName does not match targetEnvironment. Aborting before touching any database."
            exit 1
          fi
          if [ "${{ inputs.sourceEnvironment }}" = "${{ inputs.targetEnvironment }}" ]; then
            echo "::error::sourceEnvironment and targetEnvironment are the same. Refusing a no-op/self-overwrite."
            exit 1
          fi
          echo "Validated: ${{ inputs.sourceEnvironment }} -> ${{ inputs.targetEnvironment }}"

  backup-source:
    name: Backup source database
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30
    outputs:
      sourceDumpKey: ${{ steps.dump.outputs.key }}
    steps:
      - name: AWS login (OIDC) — write-only backup role
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_BACKUP_ROLE_ARN }}
          aws-region: ${{ inputs.awsRegion }}

      - name: Validate required secrets are set
        shell: bash
        env:
          DB_HOST: ${{ secrets[format('{0}_DB_HOST', inputs.sourceEnvironment)] }}
          DB_PORT: ${{ secrets[format('{0}_DB_PORT', inputs.sourceEnvironment)] }}
          DB_NAME: ${{ secrets[format('{0}_DB_NAME', inputs.sourceEnvironment)] }}
          DB_USER: ${{ secrets[format('{0}_DB_USER', inputs.sourceEnvironment)] }}
          DB_PASSWORD: ${{ secrets[format('{0}_DB_PASSWORD', inputs.sourceEnvironment)] }}
        run: |
          set -euo pipefail
          MISSING=0
          [ -n "$DB_HOST" ]     || { echo "::error::${{ inputs.sourceEnvironment }}_DB_HOST is not set."; MISSING=1; }
          [ -n "$DB_PORT" ]     || { echo "::error::${{ inputs.sourceEnvironment }}_DB_PORT is not set."; MISSING=1; }
          [ -n "$DB_NAME" ]     || { echo "::error::${{ inputs.sourceEnvironment }}_DB_NAME is not set."; MISSING=1; }
          [ -n "$DB_USER" ]     || { echo "::error::${{ inputs.sourceEnvironment }}_DB_USER is not set."; MISSING=1; }
          [ -n "$DB_PASSWORD" ] || { echo "::error::${{ inputs.sourceEnvironment }}_DB_PASSWORD is not set."; MISSING=1; }
          [ "$MISSING" -eq 0 ] || exit 1

      - name: Dump source, checksum, and upload to S3 (encrypted)
        id: dump
        shell: bash
        env:
          SOURCE: ${{ inputs.sourceEnvironment }}
          BUCKET: ${{ inputs.s3Bucket }}
          KMS_KEY_ID: ${{ inputs.kmsKeyId }}
          DB_HOST: ${{ secrets[format('{0}_DB_HOST', inputs.sourceEnvironment)] }}
          DB_PORT: ${{ secrets[format('{0}_DB_PORT', inputs.sourceEnvironment)] }}
          DB_NAME: ${{ secrets[format('{0}_DB_NAME', inputs.sourceEnvironment)] }}
          DB_USER: ${{ secrets[format('{0}_DB_USER', inputs.sourceEnvironment)] }}
          DB_PASSWORD: ${{ secrets[format('{0}_DB_PASSWORD', inputs.sourceEnvironment)] }}
        run: |
          set -euo pipefail
          TIMESTAMP="$(date -u +%Y%m%d-%H%M%S)"
          DUMP_FILE="${DB_NAME}-s2t-${TIMESTAMP}.dump"
          KEY="postgres-backups/${SOURCE}/${DUMP_FILE}"

          docker run --rm -e PGPASSWORD="$DB_PASSWORD" -v "$PWD:/backup" postgres:16.4 \
            pg_dump -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME" -F c -f "/backup/$DUMP_FILE"

          sha256sum "$DUMP_FILE" > "${DUMP_FILE}.sha256"

          if [ -n "$KMS_KEY_ID" ]; then
            SSE_ARGS=(--sse aws:kms --sse-kms-key-id "$KMS_KEY_ID")
          else
            SSE_ARGS=(--sse AES256)
          fi

          aws s3 cp "$DUMP_FILE" "s3://${BUCKET}/${KEY}" "${SSE_ARGS[@]}"
          aws s3 cp "${DUMP_FILE}.sha256" "s3://${BUCKET}/${KEY}.sha256" "${SSE_ARGS[@]}"

          echo "key=$KEY" >> "$GITHUB_OUTPUT"
          echo "Source ($SOURCE) dumped, checksummed, and uploaded: s3://${BUCKET}/${KEY}"

  migrate:
    name: Apply to target (approval required — overwrites target)
    runs-on: ubuntu-latest
    needs: backup-source
    timeout-minutes: 30
    environment:
      name: db-migrate-s2t-approval-${{ inputs.targetEnvironment }}
    steps:
      - name: AWS login (OIDC) — read+write restore role
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_RESTORE_ROLE_ARN }}
          aws-region: ${{ inputs.awsRegion }}

      - name: Validate required secrets are set
        shell: bash
        env:
          DB_HOST: ${{ secrets[format('{0}_DB_HOST', inputs.targetEnvironment)] }}
          DB_PORT: ${{ secrets[format('{0}_DB_PORT', inputs.targetEnvironment)] }}
          DB_NAME: ${{ secrets[format('{0}_DB_NAME', inputs.targetEnvironment)] }}
          DB_USER: ${{ secrets[format('{0}_DB_USER', inputs.targetEnvironment)] }}
          DB_PASSWORD: ${{ secrets[format('{0}_DB_PASSWORD', inputs.targetEnvironment)] }}
        run: |
          set -euo pipefail
          MISSING=0
          [ -n "$DB_HOST" ]     || { echo "::error::${{ inputs.targetEnvironment }}_DB_HOST is not set."; MISSING=1; }
          [ -n "$DB_PORT" ]     || { echo "::error::${{ inputs.targetEnvironment }}_DB_PORT is not set."; MISSING=1; }
          [ -n "$DB_NAME" ]     || { echo "::error::${{ inputs.targetEnvironment }}_DB_NAME is not set."; MISSING=1; }
          [ -n "$DB_USER" ]     || { echo "::error::${{ inputs.targetEnvironment }}_DB_USER is not set."; MISSING=1; }
          [ -n "$DB_PASSWORD" ] || { echo "::error::${{ inputs.targetEnvironment }}_DB_PASSWORD is not set."; MISSING=1; }
          [ "$MISSING" -eq 0 ] || exit 1

      - name: Safety backup of TARGET before overwrite (always runs, no opt-out)
        shell: bash
        env:
          TARGET: ${{ inputs.targetEnvironment }}
          BUCKET: ${{ inputs.s3Bucket }}
          KMS_KEY_ID: ${{ inputs.kmsKeyId }}
          DB_HOST: ${{ secrets[format('{0}_DB_HOST', inputs.targetEnvironment)] }}
          DB_PORT: ${{ secrets[format('{0}_DB_PORT', inputs.targetEnvironment)] }}
          DB_NAME: ${{ secrets[format('{0}_DB_NAME', inputs.targetEnvironment)] }}
          DB_USER: ${{ secrets[format('{0}_DB_USER', inputs.targetEnvironment)] }}
          DB_PASSWORD: ${{ secrets[format('{0}_DB_PASSWORD', inputs.targetEnvironment)] }}
        run: |
          set -euo pipefail
          TIMESTAMP="$(date -u +%Y%m%d-%H%M%S)"
          SAFETY_FILE="${DB_NAME}-PRE-S2T-SAFETY-${TIMESTAMP}.dump"

          docker run --rm -e PGPASSWORD="$DB_PASSWORD" -v "$PWD:/backup" postgres:16.4 \
            pg_dump -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME" -F c -f "/backup/$SAFETY_FILE"

          sha256sum "$SAFETY_FILE" > "${SAFETY_FILE}.sha256"

          if [ -n "$KMS_KEY_ID" ]; then
            SSE_ARGS=(--sse aws:kms --sse-kms-key-id "$KMS_KEY_ID")
          else
            SSE_ARGS=(--sse AES256)
          fi

          aws s3 cp "$SAFETY_FILE" "s3://${BUCKET}/postgres-backups/${TARGET}/${SAFETY_FILE}" "${SSE_ARGS[@]}"
          aws s3 cp "${SAFETY_FILE}.sha256" "s3://${BUCKET}/postgres-backups/${TARGET}/${SAFETY_FILE}.sha256" "${SSE_ARGS[@]}"

          echo "Pre-migration safety backup of TARGET ($TARGET) saved: s3://${BUCKET}/postgres-backups/${TARGET}/${SAFETY_FILE}"

      - name: Download source dump and verify checksum
        shell: bash
        env:
          BUCKET: ${{ inputs.s3Bucket }}
          KEY: ${{ needs.backup-source.outputs.sourceDumpKey }}
        run: |
          set -euo pipefail
          aws s3 cp "s3://${BUCKET}/${KEY}" ./source.dump
          aws s3 cp "s3://${BUCKET}/${KEY}.sha256" ./source.dump.sha256.remote

          EXPECTED="$(awk '{print $1}' ./source.dump.sha256.remote)"
          ACTUAL="$(sha256sum ./source.dump | awk '{print $1}')"
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::Checksum mismatch on source dump. Expected $EXPECTED, got $ACTUAL. Refusing to proceed."
            exit 1
          fi
          echo "Checksum verified: $ACTUAL"

      - name: Restore source dump onto target
        shell: bash
        env:
          TARGET: ${{ inputs.targetEnvironment }}
          SOURCE: ${{ inputs.sourceEnvironment }}
          DB_HOST: ${{ secrets[format('{0}_DB_HOST', inputs.targetEnvironment)] }}
          DB_PORT: ${{ secrets[format('{0}_DB_PORT', inputs.targetEnvironment)] }}
          DB_NAME: ${{ secrets[format('{0}_DB_NAME', inputs.targetEnvironment)] }}
          DB_USER: ${{ secrets[format('{0}_DB_USER', inputs.targetEnvironment)] }}
          DB_PASSWORD: ${{ secrets[format('{0}_DB_PASSWORD', inputs.targetEnvironment)] }}
        run: |
          set -euo pipefail
          # See postgres-restore-s3.yml for notes on --single-transaction's
          # lock-duration tradeoff on very large databases.
          docker run --rm -e PGPASSWORD="$DB_PASSWORD" -v "$PWD:/restore" postgres:16.4 \
            pg_restore -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME" \
            --clean --if-exists --no-owner --no-privileges \
            --single-transaction --exit-on-error \
            "/restore/source.dump"

          echo "Restore completed."

      - name: Post-migration verification
        shell: bash
        env:
          DB_HOST: ${{ secrets[format('{0}_DB_HOST', inputs.targetEnvironment)] }}
          DB_PORT: ${{ secrets[format('{0}_DB_PORT', inputs.targetEnvironment)] }}
          DB_NAME: ${{ secrets[format('{0}_DB_NAME', inputs.targetEnvironment)] }}
          DB_USER: ${{ secrets[format('{0}_DB_USER', inputs.targetEnvironment)] }}
          DB_PASSWORD: ${{ secrets[format('{0}_DB_PASSWORD', inputs.targetEnvironment)] }}
          CUSTOM_QUERY: ${{ inputs.postMigrationCheckQuery }}
        run: |
          set -euo pipefail
          TABLE_COUNT="$(docker run --rm -e PGPASSWORD="$DB_PASSWORD" postgres:16.4 \
            psql -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME" -t -c \
            "SELECT count(*) FROM information_schema.tables WHERE table_schema='public';")"
          TABLE_COUNT="$(echo "$TABLE_COUNT" | tr -d '[:space:]')"

          if [ "$TABLE_COUNT" -eq 0 ]; then
            echo "::error::Post-migration check failed: 0 tables found in public schema."
            exit 1
          fi
          echo "Automated check passed: $TABLE_COUNT table(s) present."

          CUSTOM_OUTPUT=""
          if [ -n "$CUSTOM_QUERY" ]; then
            CUSTOM_OUTPUT="$(docker run --rm -e PGPASSWORD="$DB_PASSWORD" postgres:16.4 \
              psql -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME" -c "$CUSTOM_QUERY" 2>&1 || echo "QUERY FAILED — see error above")"
            echo "$CUSTOM_OUTPUT"
          fi

          {
            echo "## Source-to-Target Migration Completed"
            echo ""
            echo "- Source: \`${{ inputs.sourceEnvironment }}\`"
            echo "- Target: \`${{ inputs.targetEnvironment }}\` (overwritten)"
            echo "- Source dump: \`${{ needs.backup-source.outputs.sourceDumpKey }}\` (checksum verified)"
            echo "- Pre-migration safety backup of target was created — see earlier step for its S3 location."
            echo "- Automated check: $TABLE_COUNT table(s) found."
            if [ -n "$CUSTOM_QUERY" ]; then
              echo ""
              echo "### Custom check output (review manually — not auto-evaluated)"
              echo '```'
              echo "$CUSTOM_OUTPUT"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

# --- Action version note ---
# Pinned to aws-actions/configure-aws-credentials v4.3.1 (SHA verified
# 2026-07-21). v5 and v6 have since shipped with breaking changes — see
# postgres-backup-s3.yml's footer for details before upgrading.
