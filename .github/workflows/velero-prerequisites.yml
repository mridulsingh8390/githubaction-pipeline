name: 01 - Velero Prerequisites (Install & Configure)

# Place this file at: .github/workflows/01-velero-prerequisites.yml
#
# Purpose: One-time / re-runnable setup pipeline.
#   - Creates Azure Resource Group / Storage Account / Blob Container (idempotent)
#   - Installs kubectl / helm / velero CLI on the runner
#   - Installs Velero into the target AKS cluster with the Azure plugin
#   - Configures BackupStorageLocation (BSL) against Azure Blob
#   - Wires auth via Workload Identity (preferred) or Service Principal (fallback)
#
# Required GitHub Secrets (repo or environment level):
#   AZURE_CLIENT_ID        - App registration / user-assigned identity client ID used for azure/login OIDC
#   AZURE_TENANT_ID
#   AZURE_SUBSCRIPTION_ID
#
# Only required if auth_method = service_principal:
#   VELERO_SP_CLIENT_ID
#   VELERO_SP_CLIENT_SECRET

on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: "Resource Group containing AKS + Storage Account"
        required: true
        type: string
      location:
        description: "Azure region (used only if resources need to be created)"
        required: true
        default: "eastus"
        type: string
      aks_name:
        description: "AKS cluster name to install Velero into"
        required: true
        type: string
      storage_account:
        description: "Storage Account name for Velero backups (must be globally unique)"
        required: true
        type: string
      blob_container:
        description: "Blob container name for Velero"
        required: true
        default: "velero"
        type: string
      velero_namespace:
        description: "Kubernetes namespace to install Velero into"
        required: true
        default: "velero"
        type: string
      auth_method:
        description: "How Velero authenticates to Azure Blob"
        required: true
        type: choice
        options:
          - workload_identity
          - service_principal
        default: workload_identity
      velero_plugin_version:
        description: "velero-plugin-for-microsoft-azure image tag"
        required: true
        default: "v1.11.0"
        type: string
      velero_cli_version:
        description: "Velero CLI/server version"
        required: true
        default: "v1.14.1"
        type: string
      enable_node_agent:
        description: "Install node-agent (for filesystem backup / non-CSI PV data)"
        required: true
        type: boolean
        default: true

permissions:
  id-token: write   # needed for azure/login OIDC
  contents: read

env:
  RG: ${{ inputs.resource_group }}
  AKS: ${{ inputs.aks_name }}
  SA: ${{ inputs.storage_account }}
  CONTAINER: ${{ inputs.blob_container }}
  VELERO_NS: ${{ inputs.velero_namespace }}

jobs:
  prerequisites:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "latest"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "latest"

      - name: Install Velero CLI
        run: |
          set -euo pipefail
          curl -fsSL -o velero.tar.gz \
            "https://github.com/vmware-tanzu/velero/releases/download/${{ inputs.velero_cli_version }}/velero-${{ inputs.velero_cli_version }}-linux-amd64.tar.gz"
          tar -xzf velero.tar.gz
          sudo mv velero-${{ inputs.velero_cli_version }}-linux-amd64/velero /usr/local/bin/velero
          velero version --client-only

      - name: Ensure Resource Group exists
        run: |
          az group show -n "$RG" >/dev/null 2>&1 || \
          az group create -n "$RG" -l "${{ inputs.location }}"

      - name: Ensure Storage Account exists
        run: |
          if ! az storage account show -n "$SA" -g "$RG" >/dev/null 2>&1; then
            az storage account create \
              -n "$SA" -g "$RG" -l "${{ inputs.location }}" \
              --sku Standard_LRS --kind StorageV2 --min-tls-version TLS1_2
          fi

      - name: Ensure Blob Container exists
        run: |
          az storage container create \
            --name "$CONTAINER" \
            --account-name "$SA" \
            --auth-mode login >/dev/null

      - name: Get AKS credentials
        run: |
          az aks get-credentials -g "$RG" -n "$AKS" --overwrite-existing
          kubectl create namespace "$VELERO_NS" --dry-run=client -o yaml | kubectl apply -f -

      # ---------------------------------------------------------------
      # AUTH METHOD A: Workload Identity (preferred)
      # ---------------------------------------------------------------
      - name: "[Workload Identity] Ensure AKS OIDC issuer + Workload Identity are enabled"
        if: inputs.auth_method == 'workload_identity'
        run: |
          az aks update -g "$RG" -n "$AKS" \
            --enable-oidc-issuer --enable-workload-identity || true
          echo "AKS_OIDC_ISSUER=$(az aks show -g "$RG" -n "$AKS" --query oidcIssuerProfile.issuerUrl -o tsv)" >> "$GITHUB_ENV"

      - name: "[Workload Identity] Create/reuse user-assigned managed identity"
        if: inputs.auth_method == 'workload_identity'
        run: |
          IDENTITY_NAME="id-velero-${AKS}"
          az identity show -g "$RG" -n "$IDENTITY_NAME" >/dev/null 2>&1 || \
            az identity create -g "$RG" -n "$IDENTITY_NAME" -l "${{ inputs.location }}"
          echo "IDENTITY_CLIENT_ID=$(az identity show -g "$RG" -n "$IDENTITY_NAME" --query clientId -o tsv)" >> "$GITHUB_ENV"
          echo "IDENTITY_PRINCIPAL_ID=$(az identity show -g "$RG" -n "$IDENTITY_NAME" --query principalId -o tsv)" >> "$GITHUB_ENV"
          echo "IDENTITY_RESOURCE_ID=$(az identity show -g "$RG" -n "$IDENTITY_NAME" --query id -o tsv)" >> "$GITHUB_ENV"

      - name: "[Workload Identity] Assign Storage Blob Data Contributor on Storage Account"
        if: inputs.auth_method == 'workload_identity'
        run: |
          SA_ID=$(az storage account show -n "$SA" -g "$RG" --query id -o tsv)
          az role assignment create \
            --assignee-object-id "$IDENTITY_PRINCIPAL_ID" \
            --assignee-principal-type ServicePrincipal \
            --role "Storage Blob Data Contributor" \
            --scope "$SA_ID" || echo "Role assignment already exists, continuing"

      - name: "[Workload Identity] Create federated credential for velero service account"
        if: inputs.auth_method == 'workload_identity'
        run: |
          IDENTITY_NAME="id-velero-${AKS}"
          az identity federated-credential create \
            --name "fed-velero-${AKS}" \
            --identity-name "$IDENTITY_NAME" \
            --resource-group "$RG" \
            --issuer "$AKS_OIDC_ISSUER" \
            --subject "system:serviceaccount:${VELERO_NS}:velero" \
            --audience "api://AzureADTokenExchange" || echo "Federated credential already exists, continuing"

      # ---------------------------------------------------------------
      # AUTH METHOD B: Service Principal (fallback / simple lab setup)
      # ---------------------------------------------------------------
      - name: "[Service Principal] Write credentials-velero file"
        if: inputs.auth_method == 'service_principal'
        run: |
          cat <<EOF > credentials-velero
          AZURE_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID=${{ secrets.VELERO_SP_CLIENT_ID }}
          AZURE_CLIENT_SECRET=${{ secrets.VELERO_SP_CLIENT_SECRET }}
          AZURE_RESOURCE_GROUP=${RG}
          AZURE_CLOUD_NAME=AzurePublicCloud
          EOF

      # ---------------------------------------------------------------
      # Install Velero
      # ---------------------------------------------------------------
      - name: Install Velero (Workload Identity)
        if: inputs.auth_method == 'workload_identity'
        run: |
          NODE_AGENT_FLAG=""
          if [ "${{ inputs.enable_node_agent }}" = "true" ]; then NODE_AGENT_FLAG="--use-node-agent"; fi

          velero install \
            --namespace "$VELERO_NS" \
            --provider azure \
            --plugins velero/velero-plugin-for-microsoft-azure:${{ inputs.velero_plugin_version }} \
            --bucket "$CONTAINER" \
            --backup-location-config resourceGroup="$RG",storageAccount="$SA",subscriptionId="${{ secrets.AZURE_SUBSCRIPTION_ID }}",useAAD="true" \
            --no-secret \
            $NODE_AGENT_FLAG \
            --wait

          kubectl annotate serviceaccount velero \
            -n "$VELERO_NS" \
            azure.workload.identity/client-id="$IDENTITY_CLIENT_ID" --overwrite

          kubectl label serviceaccount velero -n "$VELERO_NS" azure.workload.identity/use="true" --overwrite

          kubectl patch deployment velero -n "$VELERO_NS" \
            -p '{"spec":{"template":{"metadata":{"labels":{"azure.workload.identity/use":"true"}}}}}'

          kubectl rollout restart deployment velero -n "$VELERO_NS"
          kubectl rollout status deployment velero -n "$VELERO_NS" --timeout=180s

      - name: Install Velero (Service Principal)
        if: inputs.auth_method == 'service_principal'
        run: |
          NODE_AGENT_FLAG=""
          if [ "${{ inputs.enable_node_agent }}" = "true" ]; then NODE_AGENT_FLAG="--use-node-agent"; fi

          velero install \
            --namespace "$VELERO_NS" \
            --provider azure \
            --plugins velero/velero-plugin-for-microsoft-azure:${{ inputs.velero_plugin_version }} \
            --bucket "$CONTAINER" \
            --secret-file ./credentials-velero \
            --backup-location-config resourceGroup="$RG",storageAccount="$SA",subscriptionId="${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            $NODE_AGENT_FLAG \
            --wait

      - name: Validate Velero install
        run: |
          echo "== Pods in $VELERO_NS =="
          kubectl get pods -n "$VELERO_NS" -o wide

          echo "== BackupStorageLocation status =="
          for i in $(seq 1 10); do
            STATUS=$(velero backup-location get -n "$VELERO_NS" -o json | jq -r '.items[0].status.phase' 2>/dev/null || echo "")
            echo "Attempt $i: BSL status = $STATUS"
            if [ "$STATUS" = "Available" ]; then break; fi
            sleep 10
          done

          velero backup-location get -n "$VELERO_NS"

          if [ "$STATUS" != "Available" ]; then
            echo "::error::BackupStorageLocation did not reach Available state"
            kubectl logs -n "$VELERO_NS" deployment/velero --tail=200
            exit 1
          fi

      - name: Cleanup local secrets
        if: always()
        run: rm -f credentials-velero
