name: PR Validation

# Runs automatically on every pull request — catches syntax errors,
# malformed workflows, and broken Helm charts BEFORE merge, rather than
# discovering them the next time someone manually triggers a pipeline.
# No secrets, no cloud access, no manual trigger needed.

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  yaml-lint:
    name: Lint workflow/YAML files
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint --break-system-packages

      - name: Lint all YAML files
        run: |
          # Relaxed ruleset — catches real syntax errors and obvious
          # mistakes without being pedantic about line length/formatting
          # style, which would generate too much noise on existing files.
          cat > /tmp/yamllint-config.yml << 'EOF'
          extends: relaxed
          rules:
            line-length: disable
            document-start: disable
          EOF
          yamllint -c /tmp/yamllint-config.yml -f colored .

  validate-workflow-syntax:
    name: Validate GitHub Actions workflow syntax
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Check every workflow file parses as valid YAML
        run: |
          set -euo pipefail
          FAILED=0
          for f in .github/workflows/*.yml .github/workflows/*.yaml; do
            [ -f "$f" ] || continue
            if ! python3 -c "import yaml, sys; yaml.safe_load(open('$f'))" 2>/tmp/err.txt; then
              echo "::error file=$f::$(cat /tmp/err.txt)"
              FAILED=1
            fi
          done
          [ "$FAILED" -eq 0 ] || exit 1

  helm-lint:
    name: Lint Helm chart(s)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Find and lint every Helm chart in the repo
        run: |
          set -euo pipefail
          FAILED=0
          # Any directory containing a Chart.yaml is treated as a chart root.
          while IFS= read -r -d '' CHART_FILE; do
            CHART_DIR="$(dirname "$CHART_FILE")"
            echo "::group::helm lint $CHART_DIR"
            helm lint "$CHART_DIR" || FAILED=1
            echo "::endgroup::"
          done < <(find . -name "Chart.yaml" -print0)

          if [ "$FAILED" -eq 1 ]; then
            echo "::error::One or more Helm charts failed lint checks."
            exit 1
          fi

      - name: Template render check (catches values/template mismatches lint alone might miss)
        run: |
          set -euo pipefail
          FAILED=0
          while IFS= read -r -d '' CHART_FILE; do
            CHART_DIR="$(dirname "$CHART_FILE")"
            echo "::group::helm template $CHART_DIR"
            helm template test-release "$CHART_DIR" \
              --set image.repository=placeholder \
              --set image.tag=placeholder > /dev/null || FAILED=1
            echo "::endgroup::"
          done < <(find . -name "Chart.yaml" -print0)

          if [ "$FAILED" -eq 1 ]; then
            echo "::error::One or more Helm charts failed to render."
            exit 1
          fi

  validate-db-migrations:
    name: Validate DB migrations (ephemeral Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history needed to diff against the base branch

      - name: Check migrations folder exists
        id: check
        run: |
          if [ -d "db/migrations" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No db/migrations folder found — skipping DB migration validation."
          fi

      - name: Fetch base branch for accurate diff
        if: steps.check.outputs.exists == 'true'
        run: git fetch origin ${{ github.base_ref }} --depth=1

      - name: Check for destructive changes in this PR's migration diff
        if: steps.check.outputs.exists == 'true'
        run: |
          set -euo pipefail
          DIFF="$(git diff origin/${{ github.base_ref }}...HEAD -- db/migrations/ || true)"
          if echo "$DIFF" | grep -iE "DROP TABLE|DROP COLUMN|TRUNCATE|DROP INDEX|DROP SCHEMA|DROP CONSTRAINT" > /dev/null; then
            echo "::warning::This PR contains a potentially destructive migration (DROP TABLE / DROP COLUMN / DROP INDEX / DROP SCHEMA / DROP CONSTRAINT / TRUNCATE). Confirm a backup plan and consider the expand-contract pattern (add new, backfill, remove old in a later release) before merging."
          fi

      - name: Install Flyway CLI
        if: steps.check.outputs.exists == 'true'
        env:
          FLYWAY_VERSION: "10.17.3"
        run: |
          set -euo pipefail
          curl -sL -o flyway.tar.gz \
            "https://repo1.maven.org/maven2/org/flywaydb/flyway-commandline/${FLYWAY_VERSION}/flyway-commandline-${FLYWAY_VERSION}-linux-x64.tar.gz"
          tar -xzf flyway.tar.gz
          sudo ln -s "$(pwd)/flyway-${FLYWAY_VERSION}/flyway" /usr/local/bin/flyway
          flyway -version

      - name: Apply all migrations to ephemeral database
        if: steps.check.outputs.exists == 'true'
        run: |
          set -euo pipefail
          # Native CLI run — no container networking involved at all, since
          # this step and the postgres service both live on the same runner
          # machine. Avoids the whole docker-run-reaching-a-service-container
          # networking question entirely.
          flyway \
            -url="jdbc:postgresql://localhost:5432/testdb" \
            -user=test \
            -password=test \
            -locations="filesystem:db/migrations" \
            -connectRetries=5 \
            migrate
          echo "All migrations applied cleanly to a fresh database — no SQL syntax errors."

      - name: Validate migration checksums/history
        if: steps.check.outputs.exists == 'true'
        run: |
          set -euo pipefail
          flyway \
            -url="jdbc:postgresql://localhost:5432/testdb" \
            -user=test \
            -password=test \
            -locations="filesystem:db/migrations" \
            validate
          echo "Migration checksums and history validated — no tampered/edited-after-apply files."

  summary:
    name: Validation summary
    runs-on: ubuntu-latest
    needs: [yaml-lint, validate-workflow-syntax, helm-lint, validate-db-migrations]
    if: always()
    steps:
      - name: Summary
        run: |
          {
            echo "## PR Validation Summary"
            echo ""
            echo "| Check | Result |"
            echo "|---|---|"
            echo "| YAML lint | ${{ needs.yaml-lint.result }} |"
            echo "| Workflow syntax | ${{ needs.validate-workflow-syntax.result }} |"
            echo "| Helm lint + template | ${{ needs.helm-lint.result }} |"
            echo "| DB migration validation | ${{ needs.validate-db-migrations.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"
