name: Azure Terraform Import

on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: "Azure Resource Group to import from"
        required: true
        type: string
      environment:
        description: "Environment label"
        required: true
        type: choice
        options:
          - dev
          - qa
          - staging
          - prod
      action:
        description: "Action to run"
        required: true
        type: choice
        options:
          - discover
          - generate-tfvars
          - import-state
          - all
      tag_filter:
        description: "Filter by tag key=value (optional)"
        required: false
        type: string
        default: ""
      branch:
        description: "Branch to run from"
        required: true
        type: string
        default: "main"

concurrency:
  group: azure-import-${{ github.event.inputs.resource_group }}
  cancel-in-progress: false

jobs:

  discover:
    name: "Discover Resources"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      resource_count: ${{ steps.discover.outputs.resource_count }}
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: "true"

    steps:
      - name: Checkout import pipeline repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: List resources
        run: |
          az resource list \
            --resource-group "${{ github.event.inputs.resource_group }}" \
            --output json > /tmp/all-resources-raw.json
          echo "Total found:" $(python3 -c "import json; print(len(json.load(open('/tmp/all-resources-raw.json'))))")

      - name: Filter and report
        id: discover
        env:
          TAG_FILTER: ${{ github.event.inputs.tag_filter }}
          RESOURCE_GROUP: ${{ github.event.inputs.resource_group }}
        run: |
          python3 aks-import/scripts/discover.py
          echo "resource_count=$(cat /tmp/resource_count.txt)" >> "$GITHUB_OUTPUT"

      - name: Upload discovery report
        uses: actions/upload-artifact@v4
        with:
          name: discovery-report-${{ github.run_id }}
          path: /tmp/discovery-report.json
          retention-days: 30

  generate-tfvars:
    name: "Generate tfvars File"
    runs-on: ubuntu-latest
    needs: discover
    if: |
      github.event.inputs.action == 'generate-tfvars' ||
      github.event.inputs.action == 'all'
    permissions:
      id-token: write
      contents: read
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: "true"

    steps:
      - name: Checkout import pipeline repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: List resources
        run: |
          az resource list \
            --resource-group "${{ github.event.inputs.resource_group }}" \
            --output json > /tmp/all-resources-raw.json

      - name: Filter by tag
        env:
          TAG_FILTER: ${{ github.event.inputs.tag_filter }}
          RESOURCE_GROUP: ${{ github.event.inputs.resource_group }}
        run: python3 aks-import/scripts/discover.py

      - name: Fetch detailed properties
        run: python3 aks-import/scripts/fetch_details.py

      - name: Generate tfvars
        env:
          RESOURCE_GROUP: ${{ github.event.inputs.resource_group }}
          SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ENVIRONMENT: ${{ github.event.inputs.environment }}
        run: python3 aks-import/scripts/generate_tfvars.py

      - name: Upload tfvars
        uses: actions/upload-artifact@v4
        with:
          name: generated-tfvars-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: /tmp/generated.tfvars
          retention-days: 30

  import-state:
    name: "Import to Terraform State"
    runs-on: ubuntu-latest
    needs: discover
    if: |
      github.event.inputs.action == 'import-state' ||
      github.event.inputs.action == 'all'
    permissions:
      id-token: write
      contents: read
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: "true"
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout import pipeline repo (for scripts)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          path: import-pipeline

      - name: Checkout Terraform-LAB repo (for TF config)
        uses: actions/checkout@v4
        with:
          repository: mridulsingh8390/Terraform-LAB
          ref: main
          path: terraform-lab

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Terraform Init
        working-directory: terraform-lab/terraform/azure/azure-kubernetes-service
        run: |
          terraform init \
            -input=false \
            -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=azure/azure-kubernetes-service/${{ github.event.inputs.environment }}/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: List resources to import
        run: |
          az resource list \
            --resource-group "${{ github.event.inputs.resource_group }}" \
            --output json > /tmp/all-resources-raw.json

      - name: Run terraform import (existing resources only)
        working-directory: terraform-lab/terraform/azure/azure-kubernetes-service
        env:
          TAG_FILTER: ${{ github.event.inputs.tag_filter }}
          RESOURCE_GROUP: ${{ github.event.inputs.resource_group }}
          ENVIRONMENT: ${{ github.event.inputs.environment }}
          SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: python3 $GITHUB_WORKSPACE/import-pipeline/aks-import/scripts/run_import.py

      - name: Upload plan output
        uses: actions/upload-artifact@v4
        with:
          name: import-plan-${{ github.run_id }}
          path: /tmp/import-plan.txt
          retention-days: 30
