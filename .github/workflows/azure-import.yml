name: Azure Terraform Import

# ─────────────────────────────────────────────────────────────────────────────
# Generic Azure resource import pipeline
# Uses OIDC (Workload Identity Federation) — no client secret needed
#
# HOW IT WORKS:
#   1. DISCOVER  — Lists all resources in the target resource group
#   2. GENERATE  — Uses aztfexport to auto-generate Terraform code
#   3. VALIDATE  — Runs terraform plan against generated code
#
# REQUIRED SECRETS:
#   AZURE_CLIENT_ID       — Service principal App ID
#   AZURE_TENANT_ID       — Azure AD Tenant ID
#   AZURE_SUBSCRIPTION_ID — Azure Subscription ID
#   TF_STATE_BUCKET       — S3 bucket for state
#   TF_STATE_LOCK_TABLE   — DynamoDB table for locking
#   AWS_ACCESS_KEY_ID     — S3 backend access
#   AWS_SECRET_ACCESS_KEY — S3 backend secret
#   AWS_REGION            — S3 bucket region
#
# OIDC SETUP (one-time):
#   az ad app federated-credential create \
#     --id <APP_ID> \
#     --parameters '{
#       "name": "github-actions-federated",
#       "issuer": "https://token.actions.githubusercontent.com",
#       "subject": "repo:mridulsingh8390/Terraform-LAB:ref:refs/heads/main",
#       "audiences": ["api://AzureADTokenExchange"]
#     }'
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: "Azure Resource Group to import from"
        required: true
        type: string
      environment:
        description: "Environment label"
        required: true
        type: choice
        options: [dev, qa, staging, prod]
      action:
        description: "Action to run"
        required: true
        type: choice
        options:
          - discover
          - generate
          - discover-generate-validate
      tag_filter:
        description: "Filter by tag (format: key=value). Leave empty for all resources."
        required: false
        type: string
        default: ""
      branch:
        description: "Branch to run from"
        required: true
        type: string
        default: "main"

concurrency:
  group: azure-import-${{ github.event.inputs.resource_group }}
  cancel-in-progress: false

jobs:
  # ── STEP 1: DISCOVER ────────────────────────────────────────────────────────
  discover:
    name: "Discover | ${{ github.event.inputs.resource_group }}"
    runs-on: ubuntu-latest

    # Required for OIDC authentication
    permissions:
      id-token: write
      contents: read

    outputs:
      resource_count: ${{ steps.discover.outputs.resource_count }}
      resource_types: ${{ steps.discover.outputs.resource_types }}

    env:
      # These are set so az cli and terraform provider both authenticate
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Discover resources
        id: discover
        run: |
          RG="${{ github.event.inputs.resource_group }}"
          TAG_FILTER="${{ github.event.inputs.tag_filter }}"

          echo "================================================="
          echo " Discovering resources in: $RG"
          echo "================================================="

          # Build tag filter if provided
          TAG_ARGS=""
          if [ -n "$TAG_FILTER" ]; then
            TAG_KEY=$(echo "$TAG_FILTER" | cut -d'=' -f1)
            TAG_VAL=$(echo "$TAG_FILTER" | cut -d'=' -f2)
            TAG_ARGS="--tag $TAG_KEY=$TAG_VAL"
            echo "Filtering by tag: $TAG_KEY=$TAG_VAL"
          fi

          # List all resources in the resource group
          az resource list \
            --resource-group "$RG" \
            $TAG_ARGS \
            --output json > /tmp/all-resources.json

          RESOURCE_COUNT=$(cat /tmp/all-resources.json | python3 -c \
            "import json,sys; r=json.load(sys.stdin); print(len(r))")
          echo "Found $RESOURCE_COUNT resources"

          # Generate detailed discovery report
          python3 << 'PYEOF'
          import json
          from collections import defaultdict

          with open('/tmp/all-resources.json') as f:
              resources = json.load(f)

          by_type = defaultdict(list)
          for r in resources:
              by_type[r['type']].append({
                  'name':     r['name'],
                  'id':       r['id'],
                  'location': r.get('location', 'global'),
                  'tags':     r.get('tags', {})
              })

          report = {
              'resource_group':  '${{ github.event.inputs.resource_group }}',
              'total_resources': len(resources),
              'resource_types':  dict(by_type),
              'summary':         {t: len(v) for t, v in by_type.items()}
          }

          with open('/tmp/discovery-report.json', 'w') as f:
              json.dump(report, f, indent=2)

          print(f"\nDiscovery Summary:")
          print(f"{'='*50}")
          print(f"Total resources: {len(resources)}")
          print(f"\nBy type:")
          for t, items in sorted(by_type.items()):
              print(f"  {t}: {len(items)}")
              for item in items:
                  print(f"    - {item['name']}")
          PYEOF

          echo "resource_count=$RESOURCE_COUNT" >> "$GITHUB_OUTPUT"

          TYPES=$(python3 -c "
          import json
          with open('/tmp/discovery-report.json') as f:
              r = json.load(f)
          print(','.join(r['summary'].keys()))
          ")
          echo "resource_types=$TYPES" >> "$GITHUB_OUTPUT"

      - name: Upload discovery report
        uses: actions/upload-artifact@v4
        with:
          name: discovery-report-${{ github.event.inputs.resource_group }}-${{ github.run_id }}
          path: /tmp/discovery-report.json
          retention-days: 30

  # ── STEP 2: GENERATE TF CODE ─────────────────────────────────────────────────
  generate:
    name: "Generate TF | ${{ github.event.inputs.resource_group }}"
    runs-on: ubuntu-latest
    needs: discover
    if: |
      github.event.inputs.action == 'generate' ||
      github.event.inputs.action == 'discover-generate-validate'

    permissions:
      id-token: write
      contents: read

    env:
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install aztfexport
        run: |
          AZTFEXPORT_VERSION="0.15.0"
          curl -sL "https://github.com/Azure/aztfexport/releases/download/v${AZTFEXPORT_VERSION}/aztfexport_linux_amd64.zip" \
            -o /tmp/aztfexport.zip
          unzip -q /tmp/aztfexport.zip -d /tmp/aztfexport
          sudo mv /tmp/aztfexport/aztfexport /usr/local/bin/
          aztfexport --version

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Generate Terraform code
        run: |
          RG="${{ github.event.inputs.resource_group }}"
          OUTPUT_DIR="/tmp/generated-tf"
          mkdir -p "$OUTPUT_DIR"

          echo "================================================="
          echo " Generating Terraform code for: $RG"
          echo " Tool: aztfexport"
          echo "================================================="

          aztfexport resource-group \
            --non-interactive \
            --output-dir "$OUTPUT_DIR" \
            --overwrite \
            "$RG"

          echo ""
          echo "=== Generated files ==="
          ls -la "$OUTPUT_DIR"

          echo ""
          echo "=== Resource count ==="
          grep -c "^resource " "$OUTPUT_DIR/main.tf" 2>/dev/null \
            && echo "resources in main.tf" || echo "No main.tf generated"

          echo ""
          echo "=== Import blocks preview ==="
          head -30 "$OUTPUT_DIR/import.tf" 2>/dev/null || echo "No import.tf generated"

      - name: Add backend config
        run: |
          OUTPUT_DIR="/tmp/generated-tf"

          cat > "$OUTPUT_DIR/backend.tf" << 'TFEOF'
          terraform {
            backend "s3" {}
          }

          provider "azurerm" {
            subscription_id = var.subscription_id
            use_oidc        = true
            features {}
          }

          variable "subscription_id" {
            description = "Azure subscription ID"
            type        = string
            default     = null
          }
          TFEOF

          cat > "$OUTPUT_DIR/IMPORT_README.md" << MDEOF
          # Generated Terraform Code

          **Resource Group:** ${{ github.event.inputs.resource_group }}
          **Generated on:** $(date -u)
          **Pipeline run:** ${{ github.run_id }}
          **Resources found:** ${{ needs.discover.outputs.resource_count }}
          **Resource types:** ${{ needs.discover.outputs.resource_types }}

          ## How to apply

          1. Copy these files into your Terraform project
          2. Run: terraform init
          3. Run: terraform plan  (import blocks run automatically in TF 1.5+)
          4. Review carefully
          5. Run: terraform apply

          ## Files
          - main.tf      Resource definitions for all discovered resources
          - import.tf    Import blocks (Terraform 1.5+ native import)
          - backend.tf   S3 backend + provider config (added by pipeline)

          > Review and clean up generated code before applying.
          > Rename resources from res-0/res-1 to meaningful names.
          MDEOF

      - name: Upload generated code
        uses: actions/upload-artifact@v4
        with:
          name: generated-tf-${{ github.event.inputs.resource_group }}-${{ github.run_id }}
          path: /tmp/generated-tf/
          retention-days: 30

  # ── STEP 3: VALIDATE ─────────────────────────────────────────────────────────
  validate:
    name: "Validate | ${{ github.event.inputs.resource_group }}"
    runs-on: ubuntu-latest
    needs: [discover, generate]
    if: github.event.inputs.action == 'discover-generate-validate'

    permissions:
      id-token: write
      contents: read

    env:
      ARM_CLIENT_ID:         ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:         ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID:   ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:          "true"
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION:    ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Download generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-tf-${{ github.event.inputs.resource_group }}-${{ github.run_id }}
          path: /tmp/generated-tf

      - name: Terraform Init
        working-directory: /tmp/generated-tf
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=azure/imports/${{ github.event.inputs.resource_group }}/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        working-directory: /tmp/generated-tf
        run: terraform validate

      - name: Terraform Plan
        working-directory: /tmp/generated-tf
        run: |
          terraform plan \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -out=import-plan \
            2>&1 | tee /tmp/plan-output.txt

          echo ""
          echo "=== Plan Summary ==="
          grep -E "^Plan:|No changes|to import|to add|to change|to destroy" \
            /tmp/plan-output.txt || true

      - name: Upload plan output
        uses: actions/upload-artifact@v4
        with:
          name: plan-output-${{ github.event.inputs.resource_group }}-${{ github.run_id }}
          path: /tmp/plan-output.txt
          retention-days: 30
