name: Azure Terraform Import

on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: "Azure Resource Group to import from"
        required: true
        type: string
      environment:
        description: "Environment label"
        required: true
        type: choice
        options:
          - dev
          - qa
          - staging
          - prod
      action:
        description: "Action to run"
        required: true
        type: choice
        options:
          - discover
          - generate
          - discover-generate-validate
      tag_filter:
        description: "Filter by tag key=value (optional, leave empty for all)"
        required: false
        type: string
        default: ""
      branch:
        description: "Branch to run from"
        required: true
        type: string
        default: "main"

concurrency:
  group: azure-import-${{ github.event.inputs.resource_group }}
  cancel-in-progress: false

jobs:

  discover:
    name: "Discover Resources"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      resource_count: ${{ steps.discover.outputs.resource_count }}
      resource_types: ${{ steps.discover.outputs.resource_types }}
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: List all resources in resource group
        run: |
          az resource list \
            --resource-group "${{ github.event.inputs.resource_group }}" \
            --output json > /tmp/all-resources-raw.json
          echo "Raw resource count:" $(python3 -c "import json; print(len(json.load(open('/tmp/all-resources-raw.json'))))")

      - name: Filter and generate discovery report
        id: discover
        env:
          TAG_FILTER: ${{ github.event.inputs.tag_filter }}
          RESOURCE_GROUP: ${{ github.event.inputs.resource_group }}
        run: |
          python3 aks-import/scripts/discover.py
          echo "resource_count=$(cat /tmp/resource_count.txt)" >> "$GITHUB_OUTPUT"
          echo "resource_types=$(cat /tmp/resource_types.txt)" >> "$GITHUB_OUTPUT"

      - name: Upload discovery report
        uses: actions/upload-artifact@v4
        with:
          name: discovery-report-${{ github.run_id }}
          path: /tmp/discovery-report.json
          retention-days: 30

  generate:
    name: "Generate Terraform Code"
    runs-on: ubuntu-latest
    needs: discover
    if: |
      github.event.inputs.action == 'generate' ||
      github.event.inputs.action == 'discover-generate-validate'
    permissions:
      id-token: write
      contents: read
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install aztfexport
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq unzip
          ASSET_URL=$(curl -fsSL https://api.github.com/repos/Azure/aztfexport/releases/latest \
            | jq -r '.assets[] | select(.name | test("linux.*amd64.*zip")) | .browser_download_url')
          echo "Downloading: $ASSET_URL"
          curl -fL "$ASSET_URL" -o aztfexport.zip
          unzip -q aztfexport.zip
          chmod +x aztfexport
          sudo mv aztfexport /usr/local/bin/
          aztfexport --version

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Generate Terraform code with aztfexport
        run: |
          mkdir -p /tmp/generated-tf
          aztfexport resource-group \
            --non-interactive \
            --plain-ui \
            --overwrite \
            --output-dir /tmp/generated-tf \
            "${{ github.event.inputs.resource_group }}"
          echo "Generated files:"
          ls -la /tmp/generated-tf

      - name: Replace backend and provider with clean config
        run: bash aks-import/scripts/add_backend.sh

      - name: Upload generated Terraform code
        uses: actions/upload-artifact@v4
        with:
          name: generated-tf-${{ github.run_id }}
          path: /tmp/generated-tf/
          retention-days: 30

  validate:
    name: "Validate with Terraform Plan"
    runs-on: ubuntu-latest
    needs: [discover, generate]
    if: github.event.inputs.action == 'discover-generate-validate'
    permissions:
      id-token: write
      contents: read
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: "true"
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Download generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-tf-${{ github.run_id }}
          path: /tmp/generated-tf

      - name: Clean and fix Terraform configs
        run: |
          cd /tmp/generated-tf
          echo "=== Files before cleanup ==="
          ls -la *.tf 2>/dev/null || echo "no tf files"

          # Remove ALL tf files that aztfexport generates for backend/provider
          rm -f backend.tf terraform.tf provider.tf

          # Create clean backend.tf - empty block, values passed via -backend-config
          printf 'terraform {\n  backend "s3" {}\n}\n' > backend.tf

          # Create clean provider.tf
          printf 'provider "azurerm" {\n  features {}\n  use_oidc = true\n  subscription_id = var.subscription_id\n}\nvariable "subscription_id" {\n  type    = string\n  default = null\n}\n' > provider.tf

          echo "=== Files after cleanup ==="
          cat backend.tf
          echo "---"
          cat provider.tf

      - name: Terraform Init
        working-directory: /tmp/generated-tf
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=azure/imports/${{ github.event.inputs.resource_group }}/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        working-directory: /tmp/generated-tf
        run: terraform validate

      - name: Terraform Plan
        working-directory: /tmp/generated-tf
        run: |
          terraform plan \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -out=import-plan 2>&1 | tee /tmp/plan-output.txt
          grep -E "Plan:|No changes|to import|to add|to change|to destroy" /tmp/plan-output.txt || true

      - name: Upload plan output
        uses: actions/upload-artifact@v4
        with:
          name: plan-output-${{ github.run_id }}
          path: /tmp/plan-output.txt
          retention-days: 30
