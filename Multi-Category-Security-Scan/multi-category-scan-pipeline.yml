name: Multi-Category Security Scan Pipeline

# Tool set:
#   - Docker category:       Trivy, Dockle (no secrets needed)
#   - Host/Network category: Nmap, Nuclei, OWASP ZAP (no secrets needed)
#   - Cloud category:        ScoutSuite + Prowler (account-wide posture audit)
#     + optional Trivy scan of container images in the same account's
#     registry (ECR/ACR/Artifact Registry) — either one named image, or
#     every repo's latest tag auto-discovered in a single run.
#     (this category unavoidably needs credentials — you cannot authenticate
#     to a cloud account without a role ARN / client ID / service account,
#     so secrets are required here even though every other category is
#     secret-free)
#
# Previously dropped and still excluded: DockerShield (placeholder, tool
# never confirmed), Wiz, Burp Suite, Nessus, OpenVAS (need tokens/servers),
# Grype, Lynis, Nikto, Black Duck, Snyk, Dependency/SCA category.
#
# NOTE ON GITHUB ACTIONS UI LIMITATION:
# workflow_dispatch forms cannot show/hide fields conditionally based on
# another field's value (no cascading dropdowns). All inputs below are
# always visible when triggering manually. "scanCategory" picks which
# job runs; ignore checkboxes belonging to a category you didn't select.

on:
  workflow_dispatch:
    inputs:
      scanCategory:
        description: "Which category to scan"
        required: true
        type: choice
        default: "docker"
        options:
          - docker
          - host_network
          - cloud
          - codebase

      # --- Docker image scan options (scanCategory = docker) ---
      imageRef:
        description: "[Docker] Image to scan (repo:tag) — required, no default"
        required: true
        type: string
      runTrivy:
        description: "[Docker] Run Trivy"
        required: false
        default: true
        type: boolean
      runDockle:
        description: "[Docker] Run Dockle"
        required: false
        default: true
        type: boolean

      # --- Host/network scan options (scanCategory = host_network) ---
      targets:
        description: "[Host/Network] Comma-separated hosts/IPs/CIDRs/URLs"
        required: true
        type: string
      runNmap:
        description: "[Host/Network] Run Nmap (port/service discovery)"
        required: false
        default: true
        type: boolean
      runNuclei:
        description: "[Host/Network] Run Nuclei (template-based vuln scan)"
        required: false
        default: true
        type: boolean
      runZap:
        description: "[Host/Network] Run OWASP ZAP (assumes at least one target is a URL)"
        required: false
        default: true
        type: boolean

      # --- Cloud platform scan options (scanCategory = cloud) ---
      cloudProvider:
        description: "[Cloud] Provider to scan (requires provider credentials configured as repo/org secrets)"
        required: false
        default: "aws"
        type: choice
        options:
          - aws
          - azure
          - gcp
      cloudAwsRegion:
        description: "[Cloud][AWS] AWS region — used for ScoutSuite/Prowler/ECR discovery"
        required: false
        default: "us-east-1"
        type: string
      runScoutSuite:
        description: "[Cloud] Run ScoutSuite (cloud posture/configuration audit)"
        required: false
        default: true
        type: boolean
      runProwler:
        description: "[Cloud] Run Prowler (cloud posture/compliance audit — complements ScoutSuite)"
        required: false
        default: true
        type: boolean
      cloudRunImageScan:
        description: "[Cloud] Also Trivy-scan container image(s) from the provider's registry (CVE/severity check)"
        required: false
        default: true
        type: boolean
      cloudImageRef:
        description: "[Cloud] Scan ONE specific image (repo:tag). Leave blank + enable cloudScanAllImages to scan every repo in the registry instead."
        required: false
        default: ""
        type: string
      cloudScanAllImages:
        description: "[Cloud] If cloudImageRef is blank, auto-discover and scan the most recently pushed tag of every repository in the registry"
        required: false
        default: true
        type: boolean
      acrRegistryName:
        description: "[Cloud][Azure] ACR registry name, e.g. 'myregistry' (no .azurecr.io) — required for all-image scan mode"
        required: false
        default: ""
        type: string
      gcpArtifactLocation:
        description: "[Cloud][GCP] Artifact Registry location, e.g. us-central1 — required for all-image scan mode"
        required: false
        default: ""
        type: string
      gcpArtifactProject:
        description: "[Cloud][GCP] GCP project ID hosting the Artifact Registry repo — required for all-image scan mode"
        required: false
        default: ""
        type: string
      gcpArtifactRepository:
        description: "[Cloud][GCP] Artifact Registry repository name — required for all-image scan mode"
        required: false
        default: ""
        type: string

      # --- Codebase scan options (scanCategory = codebase) ---
      runGitleaks:
        description: "[Codebase] Run Gitleaks (secrets scan across full git history)"
        required: false
        default: true
        type: boolean
      runSemgrep:
        description: "[Codebase] Run Semgrep (SAST — static code analysis)"
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  security-events: write
  id-token: write # needed for AWS/Azure/GCP OIDC login in the cloud job

concurrency:
  group: security-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # CATEGORY: DOCKER IMAGE SCAN
  # ============================================================
  docker-scan:
    name: Docker Image Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: inputs.scanCategory == 'docker'
    outputs:
      trivy_status: ${{ steps.collect.outputs.trivy_status }}
      dockle_status: ${{ steps.collect.outputs.dockle_status }}
    steps:
      - uses: actions/checkout@v4

      - name: Pull image
        env:
          IMAGE_REF: ${{ inputs.imageRef }}
        run: docker pull "$IMAGE_REF"

      - name: Trivy scan
        id: trivy
        if: inputs.runTrivy == true
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ${{ inputs.imageRef }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy SARIF
        if: inputs.runTrivy == true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Dockle scan
        id: dockle
        if: inputs.runDockle == true
        continue-on-error: true
        env:
          IMAGE_REF: ${{ inputs.imageRef }}
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            goodwithtech/dockle:latest --exit-code 1 --exit-level warn "$IMAGE_REF" \
            | tee dockle-results.txt

      - name: Collect results
        id: collect
        if: always()
        run: |
          {
            if [ "${{ inputs.runTrivy }}" = "true" ]; then
              echo "trivy_status=${{ steps.trivy.outcome == 'success' && 'PASS' || 'FAIL' }}"
            else
              echo "trivy_status=SKIPPED"
            fi
            if [ "${{ inputs.runDockle }}" = "true" ]; then
              echo "dockle_status=${{ steps.dockle.outcome == 'success' && 'PASS' || 'FAIL' }}"
            else
              echo "dockle_status=SKIPPED"
            fi
          } >> "$GITHUB_OUTPUT"

  # ============================================================
  # CATEGORY: HOST & NETWORK SCAN
  # ============================================================
  host-network-scan:
    name: Host & Network Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: inputs.scanCategory == 'host_network'
    outputs:
      nmap_status: ${{ steps.collect.outputs.nmap_status }}
      nuclei_status: ${{ steps.collect.outputs.nuclei_status }}
      zap_status: ${{ steps.collect.outputs.zap_status }}
    steps:
      - uses: actions/checkout@v4

      - name: Nmap scan
        id: nmap
        if: inputs.runNmap == true
        continue-on-error: true
        env:
          TARGETS: ${{ inputs.targets }}
        run: |
          sudo apt-get update -y && sudo apt-get install -y nmap
          IFS=',' read -ra HOSTS <<< "$TARGETS"
          for H in "${HOSTS[@]}"; do
            nmap -sV -T4 "$H" | tee -a nmap-results.txt
          done

      - name: Nuclei scan
        id: nuclei
        if: inputs.runNuclei == true
        continue-on-error: true
        uses: projectdiscovery/nuclei-action@main
        with:
          target: ${{ inputs.targets }}

      - name: ZAP scan
        id: zap
        if: inputs.runZap == true
        continue-on-error: true
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: ${{ inputs.targets }}
          cmd_options: '-a'

      - name: Collect results
        id: collect
        if: always()
        run: |
          {
            [ "${{ inputs.runNmap }}" = "true" ] && echo "nmap_status=${{ steps.nmap.outcome == 'success' && 'PASS' || 'FAIL' }}" || echo "nmap_status=SKIPPED"
            [ "${{ inputs.runNuclei }}" = "true" ] && echo "nuclei_status=${{ steps.nuclei.outcome == 'success' && 'PASS' || 'FAIL' }}" || echo "nuclei_status=SKIPPED"
            [ "${{ inputs.runZap }}" = "true" ] && echo "zap_status=${{ steps.zap.outcome == 'success' && 'PASS' || 'FAIL' }}" || echo "zap_status=SKIPPED"
          } >> "$GITHUB_OUTPUT"

      - name: Upload raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: host-network-scan-results
          path: nmap-results.txt
          if-no-files-found: ignore

  # ============================================================
  # CATEGORY: CLOUD PLATFORM SCAN
  # ============================================================
  cloud-scan:
    name: Cloud Platform Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: inputs.scanCategory == 'cloud'
    outputs:
      scoutsuite_status: ${{ steps.collect.outputs.scoutsuite_status }}
      prowler_status: ${{ steps.collect.outputs.prowler_status }}
      cloud_provider: ${{ inputs.cloudProvider }}
      cloud_image_trivy_status: ${{ steps.collect.outputs.cloud_image_trivy_status }}
    steps:
      - uses: actions/checkout@v4

      - name: AWS login (OIDC)
        if: inputs.cloudProvider == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_SCAN_ROLE_ARN }}
          aws-region: ${{ inputs.cloudAwsRegion }}

      - name: Azure login (OIDC)
        if: inputs.cloudProvider == 'azure'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: GCP login (Workload Identity Federation)
        if: inputs.cloudProvider == 'gcp'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Run ScoutSuite scan
        id: scoutsuite
        if: inputs.runScoutSuite == true
        continue-on-error: true
        env:
          PROVIDER: ${{ inputs.cloudProvider }}
        run: |
          pip install scoutsuite
          case "$PROVIDER" in
            aws)   scout aws   --no-browser --report-dir scout-report ;;
            azure) scout azure --no-browser --report-dir scout-report --cli ;;
            gcp)   scout gcp   --no-browser --report-dir scout-report ;;
          esac

      - name: Install Prowler
        if: inputs.runProwler == true
        run: pip install prowler

      - name: Run Prowler scan
        id: prowler
        if: inputs.runProwler == true
        continue-on-error: true
        env:
          PROVIDER: ${{ inputs.cloudProvider }}
        run: |
          set -euo pipefail
          case "$PROVIDER" in
            aws)   prowler aws   --output-directory prowler-report ;;
            azure) prowler azure --az-cli-auth --output-directory prowler-report ;;
            gcp)   prowler gcp   --output-directory prowler-report ;;
          esac

      - name: Upload Prowler report
        if: always() && inputs.runProwler == true
        uses: actions/upload-artifact@v4
        with:
          name: prowler-report-${{ inputs.cloudProvider }}
          path: prowler-report
          if-no-files-found: ignore

      # ---- MODE A: single image (cloudImageRef is set) ----
      # Logs into the provider's container registry using the same
      # credentials from the login step above, so no extra secrets needed.
      - name: Cloud registry login (single image)
        id: registry_login
        if: inputs.cloudRunImageScan == true && inputs.cloudImageRef != ''
        continue-on-error: true
        env:
          PROVIDER: ${{ inputs.cloudProvider }}
          IMAGE_REF: ${{ inputs.cloudImageRef }}
        run: |
          set -euo pipefail
          case "$PROVIDER" in
            aws)
              REGISTRY="$(echo "$IMAGE_REF" | cut -d'/' -f1)"
              REGION="$(echo "$REGISTRY" | cut -d'.' -f4)"
              aws ecr get-login-password --region "$REGION" | docker login --username AWS --password-stdin "$REGISTRY"
              ;;
            azure)
              REGISTRY_NAME="$(echo "$IMAGE_REF" | cut -d'.' -f1 | cut -d'/' -f1)"
              az acr login --name "$REGISTRY_NAME"
              ;;
            gcp)
              REGISTRY="$(echo "$IMAGE_REF" | cut -d'/' -f1)"
              gcloud auth configure-docker "$REGISTRY" --quiet
              ;;
          esac

      - name: Pull cloud image (single)
        id: pull_cloud_image
        if: inputs.cloudRunImageScan == true && inputs.cloudImageRef != ''
        continue-on-error: true
        env:
          IMAGE_REF: ${{ inputs.cloudImageRef }}
        run: docker pull "$IMAGE_REF"

      - name: Trivy scan (single cloud image)
        id: cloud_image_trivy
        if: inputs.cloudRunImageScan == true && inputs.cloudImageRef != ''
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ inputs.cloudImageRef }}
          format: 'sarif'
          output: 'cloud-image-trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload single-image Trivy SARIF
        if: inputs.cloudRunImageScan == true && inputs.cloudImageRef != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'cloud-image-trivy-results.sarif'

      # ---- MODE B: all images (cloudImageRef blank + cloudScanAllImages true) ----
      # Auto-discovers every repository in the registry and scans the most
      # recently pushed tag of each with Trivy. Scans only the latest tag per
      # repo (not every historical tag) to keep runtime bounded — adjust the
      # discovery logic below if you need full tag history coverage.
      - name: Discover & scan all registry images with Trivy
        id: cloud_images_trivy_all
        if: inputs.cloudRunImageScan == true && inputs.cloudImageRef == '' && inputs.cloudScanAllImages == true
        continue-on-error: true
        env:
          PROVIDER: ${{ inputs.cloudProvider }}
          AWS_REGION_IN: ${{ inputs.cloudAwsRegion }}
          ACR_REGISTRY_NAME: ${{ inputs.acrRegistryName }}
          GCP_LOCATION: ${{ inputs.gcpArtifactLocation }}
          GCP_PROJECT: ${{ inputs.gcpArtifactProject }}
          GCP_REPO: ${{ inputs.gcpArtifactRepository }}
        run: |
          set -euo pipefail
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

          IMAGES=()

          case "$PROVIDER" in
            aws)
              ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
              REGISTRY="$ACCOUNT_ID.dkr.ecr.$AWS_REGION_IN.amazonaws.com"
              aws ecr get-login-password --region "$AWS_REGION_IN" | docker login --username AWS --password-stdin "$REGISTRY"
              mapfile -t REPOS < <(aws ecr describe-repositories --region "$AWS_REGION_IN" --query 'repositories[].repositoryName' --output text | tr '\t' '\n')
              for REPO in "${REPOS[@]}"; do
                TAG="$(aws ecr describe-images --repository-name "$REPO" --region "$AWS_REGION_IN" \
                  --query 'sort_by(imageDetails,&imagePushedAt)[-1].imageTags[0]' --output text 2>/dev/null || echo "None")"
                [ "$TAG" != "None" ] && [ -n "$TAG" ] && IMAGES+=("$REGISTRY/$REPO:$TAG")
              done
              ;;
            azure)
              [ -n "$ACR_REGISTRY_NAME" ] || { echo "::error::acrRegistryName is required for all-image scan mode on Azure."; exit 1; }
              az acr login --name "$ACR_REGISTRY_NAME"
              mapfile -t REPOS < <(az acr repository list --name "$ACR_REGISTRY_NAME" --output tsv)
              for REPO in "${REPOS[@]}"; do
                TAG="$(az acr repository show-tags --name "$ACR_REGISTRY_NAME" --repository "$REPO" --orderby time_desc --top 1 --output tsv || echo "")"
                [ -n "$TAG" ] && IMAGES+=("$ACR_REGISTRY_NAME.azurecr.io/$REPO:$TAG")
              done
              ;;
            gcp)
              [ -n "$GCP_LOCATION" ] && [ -n "$GCP_PROJECT" ] && [ -n "$GCP_REPO" ] || { echo "::error::gcpArtifactLocation, gcpArtifactProject, and gcpArtifactRepository are required for all-image scan mode on GCP."; exit 1; }
              gcloud auth configure-docker "$GCP_LOCATION-docker.pkg.dev" --quiet
              mapfile -t IMAGES < <(gcloud artifacts docker images list \
                "$GCP_LOCATION-docker.pkg.dev/$GCP_PROJECT/$GCP_REPO" \
                --include-tags --format='value(package,tags)' | awk -F'\t' '$2!="" {print $1":"$2}')
              ;;
          esac

          echo "Discovered ${#IMAGES[@]} image(s) to scan."
          FAIL=0
          for IMG in "${IMAGES[@]}"; do
            echo "== Scanning $IMG =="
            if ! trivy image --severity CRITICAL,HIGH --exit-code 1 --format table "$IMG" | tee -a trivy-all-images.txt; then
              FAIL=1
            fi
          done

          echo "images_scanned=${#IMAGES[@]}" >> "$GITHUB_OUTPUT"
          [ "$FAIL" -eq 0 ]

      - name: Upload all-images Trivy report
        if: always() && inputs.cloudRunImageScan == true && inputs.cloudImageRef == '' && inputs.cloudScanAllImages == true
        uses: actions/upload-artifact@v4
        with:
          name: cloud-all-images-trivy-report-${{ inputs.cloudProvider }}
          path: trivy-all-images.txt
          if-no-files-found: ignore

      - name: Collect results
        id: collect
        if: always()
        run: |
          {
            if [ "${{ inputs.runScoutSuite }}" = "true" ]; then
              echo "scoutsuite_status=${{ steps.scoutsuite.outcome == 'success' && 'PASS' || 'FAIL' }}"
            else
              echo "scoutsuite_status=SKIPPED"
            fi

            if [ "${{ inputs.runProwler }}" = "true" ]; then
              echo "prowler_status=${{ steps.prowler.outcome == 'success' && 'PASS' || 'FAIL' }}"
            else
              echo "prowler_status=SKIPPED"
            fi

            if [ "${{ inputs.cloudRunImageScan }}" != "true" ]; then
              echo "cloud_image_trivy_status=SKIPPED"
            elif [ -n "${{ inputs.cloudImageRef }}" ]; then
              echo "cloud_image_trivy_status=${{ steps.cloud_image_trivy.outcome == 'success' && 'PASS' || 'FAIL' }} (1 image)"
            elif [ "${{ inputs.cloudScanAllImages }}" = "true" ]; then
              echo "cloud_image_trivy_status=${{ steps.cloud_images_trivy_all.outcome == 'success' && 'PASS' || 'FAIL' }} (${{ steps.cloud_images_trivy_all.outputs.images_scanned || '0' }} images)"
            else
              echo "cloud_image_trivy_status=SKIPPED"
            fi
          } >> "$GITHUB_OUTPUT"

      - name: Upload ScoutSuite report
        if: always() && inputs.runScoutSuite == true
        uses: actions/upload-artifact@v4
        with:
          name: scoutsuite-report-${{ inputs.cloudProvider }}
          path: scout-report
          if-no-files-found: ignore

  # ============================================================
  # CATEGORY: CODEBASE SCAN (secrets + SAST)
  # ============================================================
  codebase-scan:
    name: Codebase Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: inputs.scanCategory == 'codebase'
    outputs:
      gitleaks_status: ${{ steps.collect.outputs.gitleaks_status }}
      semgrep_status: ${{ steps.collect.outputs.semgrep_status }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # scan full git history for secrets

      - name: Gitleaks scan
        id: gitleaks
        if: inputs.runGitleaks == true
        continue-on-error: true
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # auto-provided, not a user secret

      - name: Semgrep scan
        id: semgrep
        if: inputs.runSemgrep == true
        continue-on-error: true
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten

      - name: Collect results
        id: collect
        if: always()
        run: |
          {
            [ "${{ inputs.runGitleaks }}" = "true" ] && echo "gitleaks_status=${{ steps.gitleaks.outcome == 'success' && 'PASS' || 'FAIL' }}" || echo "gitleaks_status=SKIPPED"
            [ "${{ inputs.runSemgrep }}" = "true" ] && echo "semgrep_status=${{ steps.semgrep.outcome == 'success' && 'PASS' || 'FAIL' }}" || echo "semgrep_status=SKIPPED"
          } >> "$GITHUB_OUTPUT"

  # ============================================================
  # FINAL REPORT
  # ============================================================
  report:
    name: Scan Summary
    runs-on: ubuntu-latest
    needs: [docker-scan, host-network-scan, cloud-scan, codebase-scan]
    if: always()
    steps:
      - name: Build summary table
        run: |
          {
            echo "## Security Scan Summary"
            echo ""
            echo "**Category selected:** \`${{ inputs.scanCategory }}\`"
            echo ""
            echo "| Category | Tool | Status |"
            echo "|---|---|---|"

            if [ "${{ inputs.scanCategory }}" = "docker" ]; then
              echo "| Docker | Trivy | ${{ needs.docker-scan.outputs.trivy_status || 'N/A' }} |"
              echo "| Docker | Dockle | ${{ needs.docker-scan.outputs.dockle_status || 'N/A' }} |"
            elif [ "${{ inputs.scanCategory }}" = "host_network" ]; then
              echo "| Host/Network | Nmap | ${{ needs.host-network-scan.outputs.nmap_status || 'N/A' }} |"
              echo "| Host/Network | Nuclei | ${{ needs.host-network-scan.outputs.nuclei_status || 'N/A' }} |"
              echo "| Host/Network | OWASP ZAP | ${{ needs.host-network-scan.outputs.zap_status || 'N/A' }} |"
            elif [ "${{ inputs.scanCategory }}" = "cloud" ]; then
              echo "| Cloud (${{ needs.cloud-scan.outputs.cloud_provider }}) | ScoutSuite (posture) | ${{ needs.cloud-scan.outputs.scoutsuite_status || 'N/A' }} |"
              echo "| Cloud (${{ needs.cloud-scan.outputs.cloud_provider }}) | Prowler (posture/compliance) | ${{ needs.cloud-scan.outputs.prowler_status || 'N/A' }} |"
              echo "| Cloud (${{ needs.cloud-scan.outputs.cloud_provider }}) | Trivy (registry image CVE/severity) | ${{ needs.cloud-scan.outputs.cloud_image_trivy_status || 'N/A' }} |"
            elif [ "${{ inputs.scanCategory }}" = "codebase" ]; then
              echo "| Codebase | Gitleaks | ${{ needs.codebase-scan.outputs.gitleaks_status || 'N/A' }} |"
              echo "| Codebase | Semgrep | ${{ needs.codebase-scan.outputs.semgrep_status || 'N/A' }} |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Print table to logs too
        run: cat "$GITHUB_STEP_SUMMARY"
